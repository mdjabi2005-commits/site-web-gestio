name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

  concurrency:
    group: "pages"
    cancel-in-progress: true

  jobs:
    build:
      runs-on: ubuntu-latest
      if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./code-source
        run: npm install

      - name: Build main site
        working-directory: ./code-source
        run: npm run build

      - name: Copy main site output to root
        run: cp -r code-source/dist/* .

      - name: Install mobile dependencies
        working-directory: ./mobile/webapp
        run: npm install

      - name: Build mobile PWA
        working-directory: ./mobile/webapp
        run: npm run build

      - name: Copy mobile PWA to /mobile
        run: mkdir -p mobile && cp -r mobile/webapp/dist/* mobile/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    environment:
      name: github-pages
      url: "${{ steps.deployment.outputs.page_url }}"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
