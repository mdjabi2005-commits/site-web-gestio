<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Gestio</title>
  <script>
    var l = window.location;
    
    // Si l'utilisateur essaie d'accéder à l'application mobile (qui ne gère pas de routes complexes)
    if (l.pathname.startsWith('/mobile/')) {
        // Rediriger vers /mobile/ propre uniquement si l'URL contient des cochonneries (loop infinit) ou un faux chemin
        if (l.pathname !== '/mobile/' || l.search !== '' || l.hash !== '') {
            l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/mobile/');
        }
    } else {
        // Fix pour React Router sur le site web principal (racine)
        var pathSegmentsToKeep = 0;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
            l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    }
  </script>
</head>
<body></body>
</html>
